name: DeskMate CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # Check the frontend build and types
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - working-directory: ./frontend
        run: |
          npm ci
          npm run build

  # Check the orchestrator build and types
  orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './orchestrator/package-lock.json'
      - working-directory: ./orchestrator
        run: |
          npm ci
          npm run build

  # Check the RAG service Python linting
  rag-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: './rag-service/requirements.txt'
      - working-directory: ./rag-service
        run: |
          pip install -r requirements.txt
          # Basic syntax check
          python -m compileall app/
