name: Trigger auto deployment for orchestrator

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/orchestrator-AutoDeployTrigger-a87b1c49-b114-4d0f-9dd9-04272b4ea0aa.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ORCHESTRATOR_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ORCHESTRATOR_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ORCHESTRATOR_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/orchestrator
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: deskmateregistry123.azurecr.io
          registryUsername: ${{ secrets.ORCHESTRATOR_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ORCHESTRATOR_REGISTRY_PASSWORD }}
          containerAppName: orchestrator
          resourceGroup: deskmate-rg_group
          imageToBuild: deskmateregistry123.azurecr.io/orchestrator:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


