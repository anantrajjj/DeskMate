name: Trigger auto deployment for rag-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/rag-service-AutoDeployTrigger-258865d8-5460-430f-9489-582dd141648d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RAGSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RAGSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RAGSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./rag-service/Dockerfile
          contextPath: ./rag-service
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.RAGSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.RAGSERVICE_REGISTRY_PASSWORD }}
          containerAppName: rag-service
          resourceGroup: deskmate-rg_group
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


